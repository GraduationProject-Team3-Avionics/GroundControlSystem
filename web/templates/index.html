<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ground Control System</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Ground Control System</h1>
          <p id="connectionText">Disconnected</p>
        </div>
        <div class="connection">
          <select id="portSelect" aria-label="Serial port"></select>
          <input id="baudInput" type="number" min="9600" step="1" value="115200" aria-label="Baud rate">
          <button id="refreshPortsButton" type="button">Refresh</button>
          <button id="connectButton" type="button">Connect</button>
          <button id="disconnectButton" type="button">Disconnect</button>
        </div>
      </header>

      <section class="grid">
        <section class="panel commandPanel">
          <h2>Commands</h2>
          <div class="buttonGrid">
            <button data-command="hb" type="button">Heartbeat</button>
            <button data-command="arm" type="button">Arm</button>
            <button data-command="disarm" type="button">Disarm</button>
            <button data-command="hover" type="button">Hover</button>
            <button data-command="althold" type="button">Alt Hold</button>
            <button data-command="offboard" type="button">Offboard</button>
            <button data-command="ehover" type="button">Emergency Hover</button>
            <button data-command="eland" type="button">Emergency Land</button>
            <button data-command="edisarm" type="button">Emergency Disarm</button>
          </div>

          <div class="commandRow">
            <label for="pwmInput">PWM</label>
            <input id="pwmInput" type="number" min="1000" max="2000" value="1200">
            <button id="sendPwmButton" type="button">Send PWM</button>
            <button id="sendMotorButton" type="button">Motor Test</button>
          </div>

          <form id="customCommandForm" class="commandRow">
            <label for="customCommandInput">Custom</label>
            <input id="customCommandInput" type="text" placeholder="help, pwm 1200, mt 1100">
            <button type="submit">Send</button>
          </form>

          <p id="messageText" class="message"></p>
        </section>

        <section class="panel attitudePanel">
          <div class="panelHeader">
            <h2>Attitude</h2>
            <span id="attitudeStatus" class="statusPill">No IMU</span>
          </div>
          <div class="attitudeCanvasWrap">
            <canvas id="attitudeCanvas" aria-label="Artificial horizon attitude indicator"></canvas>
          </div>
          <div class="attitudeReadout">
            <div>
              <span>Roll</span>
              <strong id="rollValue">0.0 deg</strong>
            </div>
            <div>
              <span>Pitch</span>
              <strong id="pitchValue">0.0 deg</strong>
            </div>
            <div>
              <span>Yaw</span>
              <strong id="yawValue">0.0 deg</strong>
            </div>
          </div>
        </section>

        <section class="panel logPanel">
          <div class="panelHeader">
            <h2>Recent Activity</h2>
            <button id="clearLogButton" type="button">Clear View</button>
          </div>
          <pre id="logOutput"></pre>
        </section>
      </section>
    </main>

    <script src="/static/attitude.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
